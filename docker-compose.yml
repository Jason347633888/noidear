version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    # security:docker 当前因第三方镜像 rolling tag 无法通过 Trivy 扫描（所有候选均有 CRITICAL CVE），待上游发布修复版本后切换为 immutable digest。
    image: postgres:15-alpine
    container_name: noidear-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: noidear
      POSTGRES_PASSWORD: noidear123
      POSTGRES_DB: document_system
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noidear -d document_system"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    # security:docker 当前因第三方镜像 rolling tag 无法通过 Trivy 扫描（所有候选均有 CRITICAL CVE），待上游发布修复版本后切换为 immutable digest。
    image: redis:7-alpine
    container_name: noidear-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO 对象存储
  minio:
    # security:docker 当前因第三方镜像 rolling tag 无法通过 Trivy 扫描（所有候选均有 CRITICAL CVE），待上游发布修复版本后切换为 immutable digest。
    image: minio/minio:latest
    container_name: noidear-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: noidear123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # 后端 NestJS 服务
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: noidear-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://noidear:noidear123@postgres:5432/document_system
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - JWT_EXPIRES_IN=7d
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_USE_SSL=false
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=noidear123
      - NODE_ENV=production
      - SWAGGER_ENABLED=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  # 前端 Vue 3 服务（nginx 静态托管 + API 反向代理）
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: noidear-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server


volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  default:
    name: noidear-network
  noidear-network:
    driver: bridge
